services:
  - type: web
    name: walwal
    runtime: python
    buildCommand: pip install fastapi "uvicorn[standard]" && cd front && npm install && npm run build && cd ..
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  - type: worker
    name: walwal-agent
    runtime: python
    buildCommand: pip install openai langchain-openai langgraph python-dotenv requests
    startCommand: python agent_worker.py
